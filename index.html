.s-card.mid .num{color:var(--yellow)}
.s-card.bad .num{color:var(--red)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:14px}

.card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-name{font-size:17px;font-weight:600;color:#fff}

.card-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;font-size:11px}
.tag{padding:3px 10px;border-radius:10px;background:rgba(255,255,255,.04);color:var(--sub)}
.tag a{color:var(--accent2);text-decoration:none}
.tag a:hover{text-decoration:underline}
.card-note{font-size:11px;color:#666;margin-bottom:10px;padding:8px 10px;background:rgba(255,255,255,.02);border-radius:8px}

// State
let activeCat = '全部';
let searchQuery = '';
const cats = ['全部', ...new Set(tools.map(t => t.cat))];

document.getElementById('total-count').textContent = tools.length;

function render(){
  searchQuery = document.getElementById('search').value.trim().toLowerCase();
  let list = tools;
  if(activeCat !== '全部') list = list.filter(t => t.cat === activeCat);
  if(searchQuery) list = list.filter(t =>
    t.name.toLowerCase().includes(searchQuery) || t.desc.includes(searchQuery) ||
    t.cat.includes(searchQuery) || t.alts.some(a => a.name.includes(searchQuery)));

  const ok = list.filter(t => t.acc === 'yes').length;
  const mid = list.filter(t => t.acc === 'partial').length;
  const bad = list.filter(t => t.acc === 'no').length;

  // Filters
  document.getElementById('filters').innerHTML = cats.map(c => {
    const n = c === '全部' ? tools.length : tools.filter(t => t.cat === c).length;
    return `<span class="f-btn${c===activeCat?' on':''}" onclick="setCat('${c}')">${c} (${n})</span>`;
  }).join('');

  // Stats
  document.getElementById('stats').innerHTML = `
    <div class="s-card ok"><div class="num">${ok}</div><div class="lbl">✅ 国内直接可用</div></div>
    <div class="s-card mid"><div class="num">${mid}</div><div class="lbl">⚠️ 部分可用</div></div>
    <div class="s-card bad"><div class="num">${bad}</div><div class="lbl">🔒 暂不可用</div></div>
    <div class="s-card"><div class="num">${ok+mid+bad}</div><div class="lbl">📊 筛选结果</div></div>
  `;

  // Cards
  document.getElementById('grid').innerHTML = list.map(t => {
    const badge = t.acc === 'yes' ? `<span class="card-badge badge-ok">✅ 国内可用</span>`
      : t.acc === 'partial' ? `<span class="card-badge badge-mid">⚠️ 部分可用</span>`
      : `<span class="card-badge badge-no">🔒 暂不可用</span>`;
    const altsHTML = t.alts.length ? `
      <div class="alts">
        <div class="alts-title">🇨🇳 国产替代</div>
        ${t.alts.map(a => `<div class="alt-row"><a href="${a.url}" target="_blank" rel="noopener">${a.name}</a><span>${a.note}</span></div>`).join('')}
      </div>` : (t.acc === 'yes' ? '' : '<div class="alts"><div class="alts-title" style="color:var(--yellow)">⚠️ 暂无成熟国产替代</div></div>');
    return `
    <div class="card">
      <div class="card-top"><div class="card-name">${t.name}</div>${badge}</div>
      <div class="card-cat">${t.cat}</div>
      <div class="card-desc">${t.desc}</div>
      ${t.note ? `<div class="card-note">💡 ${t.note}</div>` : ''}
      <div class="card-row"><span class="tag">💰 ${t.price}</span></div>
      ${altsHTML}
    </div>`;
  }).join('');
}

function setCat(c){activeCat = c;render();}

// Init
render();
