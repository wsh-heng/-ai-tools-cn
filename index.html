@media (prefers-color-scheme: dark) { header { background: rgba(44,44,46,0.85); } }
.header-inner {

}
.logo { font-size: 20px; font-weight: 700; }
.logo span { color: var(--accent); }
.header-stats { font-size: 13px; color: var(--sub); display: flex; gap: 16px; flex-wrap: wrap; }
.header-stats b { color: var(--text); }

/* Main */
main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

.search-bar {
  display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
}
.search-bar input {
  flex: 1; min-width: 200px;
  padding: 12px 18px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 15px; outline: none;
  transition: border 0.2s;
}
.search-bar input:focus { border-color: var(--accent); }
.filter-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.filter-tag {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--card); color: var(--sub); font-size: 13px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.filter-tag:hover { border-color: var(--accent); color: var(--accent); }
.filter-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Stats Row */
.stats-row {
  display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
  gap: 12px; margin-bottom: 24px;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; text-align: center;
}
.stat-card .num { font-size: 32px; font-weight: 700; }
.stat-card .label { font-size: 12px; color: var(--sub); margin-top: 4px; }
.stat-card.green .num { color: var(--green); }
.stat-card.yellow .num { color: var(--yellow); }
.stat-card.red .num { color: var(--red); }

/* Tool Cards */
.tools-grid {
  display: grid; grid-template-columns: repeat(auto-fill,minmax(340px,1fr));
  gap: 16px;
}
.tool-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;

}
.tool-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
.tool-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.tool-name { font-size: 17px; font-weight: 600; }
.tool-cat { font-size: 11px; color: var(--sub); margin-bottom: 8px; }
.tool-desc { font-size: 13px; color: var(--sub); margin-bottom: 12px; line-height: 1.5; }
.tool-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; font-size: 12px; }
.badge {
  display: inline-flex; align-items: center; gap:4px;

.badge-ok { background: rgba(52,199,89,0.15); color: var(--green); }
.badge-mid { background: rgba(255,149,0,0.15); color: var(--yellow); }
.badge-no { background: rgba(255,59,48,0.15); color: var(--red); }

// ===== STATE =====
let activeCat = '全部';
let searchQuery = '';

// ===== CATEGORIES =====
const cats = ['全部', ...new Set(tools.map(t => t.cat))];

// ===== RENDER =====
function render() {
  searchQuery = document.getElementById('search').value.trim().toLowerCase();

  // Filter
  let filtered = tools;
  if (activeCat !== '全部') filtered = filtered.filter(t => t.cat === activeCat);
  if (searchQuery) filtered = filtered.filter(t =>
    t.name.toLowerCase().includes(searchQuery) ||
    t.desc.toLowerCase().includes(searchQuery) ||
    t.cat.toLowerCase().includes(searchQuery) ||
    t.alts.some(a => a.name.toLowerCase().includes(searchQuery))
  );

  // Header stats
  const okCount = tools.filter(t => t.acc === 'yes').length;
  const midCount = tools.filter(t => t.acc === 'partial').length;
  const noCount = tools.filter(t => t.acc === 'no').length;
  document.getElementById('header-stats').innerHTML =
    `共 <b>${tools.length}</b> 个工具 | <span style="color:var(--green)">✅ ${okCount} 国内可用</span> | <span style="color:var(--yellow)">⚠️ ${midCount} 部分可用</span> | <span style="color:var(--red)">🚫 ${noCount} 🔒 需特殊网络</span>`;

  // Category filters
  document.getElementById('filters').innerHTML = cats.map(c => {
    const count = c === '全部' ? tools.length : tools.filter(t => t.cat === c).length;
    return `<span class="filter-tag${c === activeCat ? ' active' : ''}" onclick="setCat('${c}')">${c} (${count})</span>`;
  }).join('');

  // Stats row
  const fOk = filtered.filter(t => t.acc === 'yes').length;
  const fMid = filtered.filter(t => t.acc === 'partial').length;
  const fNo = filtered.filter(t => t.acc === 'no').length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card green"><div class="num">${fOk}</div><div class="label">✅ 国内直接能用</div></div>
    <div class="stat-card yellow"><div class="num">${fMid}</div><div class="label">⚠️ 部分可用/需技巧</div></div>
    <div class="stat-card red"><div class="num">${fNo}</div><div class="label">🚫 暂不可用</div></div>
    <div class="stat-card"><div class="num">${fOk + fMid + fNo}</div><div class="label">📊 当前筛选结果</div></div>
  `;

  // Tool cards
  if (filtered.length === 0) {
    document.getElementById('tools-grid').innerHTML = '';
    document.getElementById('no-results').style.display = 'block';
  } else {
    document.getElementById('no-results').style.display = 'none';
    document.getElementById('tools-grid').innerHTML = filtered.map(t => {
      const accBadge = t.acc === 'yes' ? `<span class="badge badge-ok">✅ 国内可用</span>`
        : t.acc === 'partial' ? `<span class="badge badge-mid">⚠️ 部分可用</span>`
        : `<span class="badge badge-no">🚫 🔒 需特殊网络</span>`;
      const altsHTML = t.alts.length > 0 ? `
        <div class="alt-section">
          <div class="alt-title">🇨🇳 国产替代方案</div>
          ${t.alts.map(a => `
            <div class="alt-item">
              <a href="https://${a.url}" target="_blank" rel="noopener">${a.name}</a>
              <span class="alt-note">${a.note}</span>
            </div>`).join('')}
        </div>` : (t.acc === 'yes' ? '' : '<div class="alt-section"><div class="alt-title" style="color:var(--yellow)">⚠️ 暂无成熟国产替代</div></div>');
      return `
        <div class="tool-card">
          <div class="tool-header">
            <div>
              <div class="tool-name">${t.name}</div>
              <div class="tool-cat">${t.cat}</div>
            </div>
            ${accBadge}
          </div>
          <div class="tool-desc">${t.desc}</div>
          <div class="tool-meta">
            <span class="badge badge-tag">🔗 ${t.url}</span>
            <span class="badge badge-tag">💰 ${t.priceCNY || t.priceUSD}</span>
          </div>
          ${t.acc !== 'yes' ? `<div class="price-row">🔧 ${t.vpn}</div>` : ''}
          ${altsHTML}
        </div>`;
    }).join('');
  }
}

function setCat(cat) {
  activeCat = cat;
  render();
  document.getElementById('search').focus();
}

// Init
render();
document.getElementById('search').addEventListener('input', render);
